{% extends "base.html" %}
{% block title %}{{ 'Add' if is_new else 'Edit' }} Achievement — FutBot Dashboard{% endblock %}

{% block content %}
<div class="d-flex align-items-center mb-4">
  <a href="{{ url_for('achievements') }}" class="btn btn-outline-secondary btn-sm me-3">
    <i class="bi bi-arrow-left"></i>
  </a>
  <h4 class="mb-0 fw-bold">{{ 'Add Achievement' if is_new else 'Edit Achievement' }}</h4>
</div>

<div class="card form-card p-4" style="max-width: 600px;">
  <form method="post">
    <div class="mb-3">
      <label class="form-label">Title <span class="text-danger">*</span></label>
      <input type="text" name="title" class="form-control"
             value="{{ ach.get('title', '') }}" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Description</label>
      <textarea name="description" class="form-control" rows="3">{{ ach.get('description', '') }}</textarea>
    </div>
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary">
        <i class="bi bi-check-lg me-1"></i>{{ 'Add' if is_new else 'Save' }}
      </button>
      <a href="{{ url_for('achievements') }}" class="btn btn-outline-secondary">Cancel</a>
      {% if not is_new %}
      <form method="post"
            action="{{ url_for('delete_achievement', achievement_id=ach.achievement_id) }}"
            class="ms-auto"
            onsubmit="return confirm('Delete this achievement?')">
        <button type="submit" class="btn btn-outline-danger btn-sm">
          <i class="bi bi-trash me-1"></i>Delete
        </button>
      </form>
      {% endif %}
    </div>
  </form>
</div>
{% endblock %}
