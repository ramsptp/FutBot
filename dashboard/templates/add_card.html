{% extends "base.html" %}
{% block title %}Add Card — FutBot Dashboard{% endblock %}

{% block content %}
<div class="d-flex align-items-center mb-4">
  <a href="{{ url_for('cards') }}" class="btn btn-outline-secondary btn-sm me-3">
    <i class="bi bi-arrow-left"></i>
  </a>
  <h4 class="mb-0 fw-bold">Add New Card</h4>
</div>

<div class="card form-card p-4">
  <form method="post">
    {% include '_card_form.html' %}
    <div class="d-flex gap-2 mt-4">
      <button type="submit" class="btn btn-primary">
        <i class="bi bi-plus-lg me-1"></i>Add Card
      </button>
      <a href="{{ url_for('cards') }}" class="btn btn-outline-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
